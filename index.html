<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link

    rel="stylesheet" />
  <title>syncSpace</title>
  <script>
    // Prevents FOUC by setting theme from localStorage or system preference before React loads
    (function () {
      try {
        const theme = localStorage.getItem('syncSpaceTheme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        console.error('Could not set initial theme', e);
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            // GitHub-Dark Navy Palette
            brand: {
              dark: '#0D1117',
              surface: '#161B22',
              'surface-light': '#21262D',
              border: '#30363D',
            },
            cloud: {
              DEFAULT: '#E6EDF3',
              strong: '#8B949E',
              border: '#30363D',
            },
            accent: {
              primary: '#3FB950',
              secondary: '#58A6FF',
              tertiary: '#F85149',
            },
            status: {
              success: '#3FB950',
              warning: '#D29922',
              error: '#F85149',
              info: '#58A6FF',
            }
          },
          backgroundImage: {
            'grid-pattern': "linear-gradient(to right, #21262D 1px, transparent 1px), linear-gradient(to bottom, #21262D 1px, transparent 1px)",
            'grid-pattern-light': "linear-gradient(to right, #21262D 1px, transparent 1px), linear-gradient(to bottom, #21262D 1px, transparent 1px)",
          }
        }
      }
    }
  </script>
  <style>
    /* Tiptap General Styles */
    .ProseMirror {
      outline: none;
      padding: 0.75rem;
    }

    .ProseMirror>*+* {
      margin-top: 0.75em;
    }

    .ProseMirror ul,
    .ProseMirror ol {

    }

    .ProseMirror h1,

      font-weight: 600;
    }

    .ProseMirror h1 {

    }

    .ProseMirror h2 {

    }

    .ProseMirror h3 {
      font-size: 1.2em;

    .ProseMirror a {
      color: #3b82f6;
      text-decoration: underline;
      cursor: pointer;
    }

    .ProseMirror blockquote {
      padding-left: 1rem;
      border-left: 3px solid #d1d5db;
    }

    .dark .ProseMirror blockquote {
      border-left: 3px solid #4b5563;
    }

    .ProseMirror pre {
      background: #161B22;
      color: #e5e7eb;
      font-family: 'JetBrainsMono', monospace;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
    }

    .dark .ProseMirror pre {
      background: #0D1117;
    }

    .ProseMirror pre code {
      color: inherit;
      padding: 0;
      background: none;
      font-size: 0.8rem;
    }

    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      float: left;
      color: #6b7280;
      pointer-events: none;
      height: 0;
    }
  </style>
