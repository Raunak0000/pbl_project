services:

  # ── MongoDB ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: syncspace-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - syncspace-network

  # ── Spring Boot Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./syncspace-backend
      dockerfile: Dockerfile.backend
    container_name: syncspace-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_PORT=${SERVER_PORT}
    depends_on:
      - mongo
    networks:
      - syncspace-network

  # ── React Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: syncspace-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - syncspace-network

# ── Persistent Volume for MongoDB data ───────────────────────────
volumes:
  mongo-data:

    # ── Internal network for containers to talk to each other ────────
networks:
  syncspace-network:
    driver: bridge
