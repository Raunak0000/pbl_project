# MongoDB — reads from Docker environment variable, falls back to local default
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/syncspace}
spring.data.mongodb.database=syncspace

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# JWT — reads from Docker environment variable, falls back to existing secret
jwt.secret=${JWT_SECRET:4a6f686e446f655365637265744b65794a575431323334353637383930313233}
jwt.expiration=86400000

# Server port
server.port=${SERVER_PORT:8081}

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never